name: quepid-unit-tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build the stack
        run: bin/setup_docker
      - name: Style — RuboCop
        run: bin/docker r bin/rubocop
      - name: Tests — Rails (Minitest)
        run: bin/docker r rails test
      - name: Tests — Frontend (ESLint/Prettier, Vitest)
        run: bin/docker r rails test:frontend
