default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      concurrency_maintenance_interval: 600
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: <%= ENV.fetch("SOLID_QUEUE_POLLING", 0.1) %>

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
