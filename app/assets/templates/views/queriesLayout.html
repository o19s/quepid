<!-- queriesCtrl.js is the ng-controller -->
<div id="main">
  <div class="pane_container">
    <div class="pane_main results-control">
      <!-- Case header is server-rendered in core/_case_header.html.erb, above ng-view -->

      <div id="case-actions" class="row" ng-controller="CaseCtrl">
        <div class="col-sm-12" ng-if="caseModel.caseLoaded()">
          <ul class="list-inline">
            <li>
              <span class="glyphicon glyphicon-tasks"></span>
              <a name="button" ng-click="pickCaseScorer()">
                Select scorer
              </a>
            </li>
            <li>
              <judgements
                acase="caseModel.selectedCase()"
              </judgements>
            </li>
            <li>
              <span class="glyphicon glyphicon-camera"></span>
              <a ng-controller="TakeSnapshotCtrl" type="button" ng-click="snapshot.prompt()">
                Create snapshot
              </a>
            </li>
            <li>
              <diff></diff>
            </li>
            <li>
              <import-ratings
                acase="caseModel.selectedCase()"
              ></import-ratings>
            </li>
            <li>
              <share-case
                acase="caseModel.selectedCase()"
              ></share-case>
            </li>
            <li>
              <clone-case
                acase="caseModel.selectedCase()"
              ></clone-case>
            </li>
            <li>
              <delete-case-options
                acase="caseModel.selectedCase()"
              ></delete-case-options>
            </li>
            <li>
              <export-case
                icon-only="false"
                acase="caseModel.selectedCase()"
                supports-detailed-export="true"
              ></export-case>
            </li>
            <li id="tune-relevance-link">
              <span class="glyphicon glyphicon-wrench"></span>
              <a type="button" ng-click="toggleDevSettings()">
                Tune Relevance
              </a>
            </li>
          </ul>
        </div>
      </div> <!-- end of #case-actions -->

      <!-- see queries directive -->
      <queries></queries>

      <div ng-controller="WizardCtrl"></div>
    </div>

    <div class="east-slider">
    </div>

    <div class="pane_east">
      <ng-include src="'views/_dev_settings.html'"></ng-include>
    </div>
    <div class="clearfix"></div>
  </div>
</div>
