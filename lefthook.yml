pre-commit:
  parallel: true
  jobs:
    # Staged Ruby only (not the whole tree). Requires Docker (`bin/docker`).
    # Skip when needed: git commit --no-verify
    - name: rubocop-staged
      run: |
        set -e
        staged=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(rb|rake|gemspec)$|^(Gemfile|Rakefile)$' || true)
        if [ -z "$staged" ]; then exit 0; fi
        bin/docker r bin/rubocop --force-exclusion $staged

    - name: no-direct-controller-access
      glob: "app/javascript/controllers/*.js"
      run: |
        if grep -n 'getControllerForElementAndIdentifier' {staged_files}; then
          echo ""
          echo "ERROR: Use Stimulus outlets instead of getControllerForElementAndIdentifier()."
          echo "  Declare: static outlets = [\"other-controller\"]"
          echo "  Access:  this.otherControllerOutlets"
          exit 1
        fi

    - name: no-hardcoded-slash-urls
      glob: "app/javascript/{controllers,modules}/*.js"
      run: |
        if grep -n 'fetch(`/' {staged_files} | grep -v 'node_modules'; then
          echo ""
          echo "ERROR: Don't start fetch URLs with /. Use apiUrl() from modules/api_url."
          echo "  Example: fetch(apiUrl(\`api/cases/\${caseId}/queries\`))"
          exit 1
        fi

    - name: no-inline-styles-in-js
      glob: "app/javascript/controllers/*.js"
      run: |
        if grep -n 'style="' {staged_files}; then
          echo ""
          echo "ERROR: Don't use inline styles in Stimulus controllers."
          echo "  Define CSS classes in app/assets/stylesheets/ and add to build_css.js."
          exit 1
        fi
